<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Admission - Pathshala coaching centre</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="text-slate-800 antialiased flex flex-col md:flex-row min-h-screen bg-slate-50">
    <aside class="w-full md:w-64 bg-slate-900 text-slate-200 flex flex-col shadow-xl">
        <div class="p-5 bg-slate-950 border-b border-slate-800 flex justify-between items-center"><span class="text-xl font-bold text-indigo-400">Pathshala</span></div>
        <nav class="p-4 space-y-1.5 flex-1">
            <a href="dashboard.html" class="flex items-center space-x-3 px-4 py-2.5 rounded-xl hover:bg-slate-800 text-sm text-slate-400 hover:text-white"><i class="fa-solid fa-chart-pie w-5"></i><span>Dashboard</span></a>
            <div class="pt-4">
                <p class="px-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Management</p>
                <a href="student-entry.html" class="flex items-center space-x-3 px-4 py-3 rounded-xl bg-indigo-600 text-white text-sm font-semibold shadow-md"><i class="fa-solid fa-user-plus w-5"></i><span>Student Admission</span></a>
                <a href="student-list.html" class="flex items-center space-x-3 px-4 py-2.5 rounded-xl hover:bg-slate-800 text-sm text-slate-400 hover:text-white"><i class="fa-solid fa-users w-5"></i><span>Student List</span></a>
                <a href="payment-tracker.html" class="flex items-center space-x-3 px-4 py-2.5 rounded-xl hover:bg-slate-800 text-sm text-slate-400 hover:text-white"><i class="fa-solid fa-money-check-dollar w-5"></i><span>Monthly Payment Tracker</span></a>
                <a href="batch-control.html" class="flex items-center space-x-3 px-4 py-2.5 rounded-xl hover:bg-slate-800 text-sm text-slate-400 hover:text-white"><i class="fa-solid fa-cubes w-5"></i><span>Batch Management</span></a>
            </div>
        </nav>
    </aside>

    <main class="flex-1 p-4 md:p-8 flex items-center justify-center">
        <div class="w-full max-w-xl bg-white p-6 md:p-8 rounded-2xl border border-slate-200 shadow-sm space-y-6">
            <div>
                <h1 class="text-xl font-bold text-slate-900">New Student Registration</h1>
                <p class="text-xs text-slate-500 mt-0.5">Enter details to enroll a new student into the cloud database</p>
            </div>

            <form id="studentForm" class="space-y-4 text-xs">
                <div>
                    <label class="block font-bold text-slate-500 mb-1">Student Full Name</label>
                    <input type="text" id="studentName" required placeholder="Amit Das" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none font-medium">
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block font-bold text-slate-500 mb-1">WhatsApp/ Mobile Number</label>
                        <input type="tel" id="studentMobile" required placeholder="6294005916" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none font-medium">
                    </div>
                    <div>
                        <label class="block font-bold text-slate-500 mb-1">Select Batch Cluster</label>
                        <select id="studentBatch" required class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none font-semibold text-slate-700"></select>
                    </div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div>
                        <label class="block font-bold text-slate-500 mb-1">Admission Fee (INR)</label>
                        <input type="number" id="admissionFee" required value="1500" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none font-bold text-slate-700">
                    </div>
                    <div>
                        <label class="block font-bold text-slate-500 mb-1">Monthly Tuition Fee (INR)</label>
                        <input type="number" id="monthlyFee" required class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none font-bold text-indigo-600">
                    </div>
                    <div>
                        <label class="block font-bold text-slate-500 mb-1">Admission/Billing Date</label>
                        <input type="date" id="billingDate" required class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none font-semibold text-slate-600">
                    </div>
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-md text-sm flex items-center justify-center gap-2">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Submit Registration
                </button>
            </form>
        </div>
    </main>

    <script>
        const GOOGLE_APP_URL = "https://script.google.com/macros/s/AKfycbx1-7inWYwDflcy-fuKv4lWz0OZC7d5jgMzH_sPyKf6WUFEJAvcOoBidjTvCYyHkHxa/exec"; // <-- এখানে নতুন Deployment URL বসান

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('billingDate').value = new Date().toISOString().split('T')[0];
            fetch(`${GOOGLE_APP_URL}?action=getBatches`).then(res => res.json()).then(batches => {
                const select = document.getElementById('studentBatch');
                if(batches.length === 0) { select.innerHTML = '<option value="">No Batches Found!</option>'; }
                else { select.innerHTML = batches.map(b => `<option value="${b}">${b}</option>`).join(''); }
            });
        });

        document.getElementById('studentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> Uploading to Cloud...';
            btn.disabled = true;

            const payload = {
                action: "addStudent",
                name: document.getElementById('studentName').value,
                mobile: document.getElementById('studentMobile').value,
                batch: document.getElementById('studentBatch').value,
                fee: document.getElementById('monthlyFee').value,
                admissionFee: document.getElementById('admissionFee').value,
                billingDate: document.getElementById('billingDate').value
            };

            fetch(GOOGLE_APP_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload) })
            .then(res => res.text())
            .then(() => {
                alert("Student Registration Successful! Saved in DD/MM/YYYY format! ✅");
                document.getElementById('studentForm').reset();
                document.getElementById('billingDate').value = new Date().toISOString().split('T')[0];
            }).finally(() => {
                btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Submit Registration';
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
