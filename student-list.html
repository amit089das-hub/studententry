<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Roster - EduManager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="text-slate-800 antialiased flex flex-col md:flex-row min-h-screen bg-slate-50">
    <aside class="w-full md:w-64 bg-slate-900 text-slate-200 flex flex-col shadow-xl">
        <div class="p-5 bg-slate-950 border-b border-slate-800 flex justify-between items-center"><span class="text-xl font-bold text-indigo-400">EduManager Pro</span></div>
        <nav class="p-4 space-y-1.5 flex-1">
            <a href="dashboard.html" class="flex items-center space-x-3 px-4 py-2.5 rounded-xl hover:bg-slate-800 text-sm text-slate-400 hover:text-white"><i class="fa-solid fa-chart-pie w-5"></i><span>Dashboard</span></a>
            <div class="pt-4">
                <p class="px-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Management</p>
                <a href="student-entry.html" class="flex items-center space-x-3 px-4 py-2.5 rounded-xl hover:bg-slate-800 text-sm text-slate-400 hover:text-white"><i class="fa-solid fa-user-plus w-5"></i><span>Student Admission</span></a>
                <a href="student-list.html" class="flex items-center space-x-3 px-4 py-3 rounded-xl bg-indigo-600 text-white text-sm font-semibold shadow-md"><i class="fa-solid fa-users w-5"></i><span>Student List</span></a>
                <a href="payment-tracker.html" class="flex items-center space-x-3 px-4 py-2.5 rounded-xl hover:bg-slate-800 text-sm text-slate-400 hover:text-white"><i class="fa-solid fa-money-check-dollar w-5"></i><span>Monthly Payment Tracker</span></a>
                <a href="batch-control.html" class="flex items-center space-x-3 px-4 py-2.5 rounded-xl hover:bg-slate-800 text-sm text-slate-400 hover:text-white"><i class="fa-solid fa-cubes w-5"></i><span>Batch Management</span></a>
            </div>
        </nav>
    </aside>

    <main class="flex-1 p-4 md:p-8 space-y-6">
        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex justify-between items-center">
            <div><h1 class="text-xl font-bold text-slate-900">Master Student Roster</h1><p class="text-xs text-slate-500 mt-0.5">View profiles and structural admission records</p></div>
            <div id="loader" class="text-xs text-indigo-600 font-bold"><i class="fa-solid fa-spinner animate-spin"></i> Fetching Database...</div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-sm">
                    <thead>
                        <tr class="bg-slate-50 text-slate-400 font-bold border-b text-xs uppercase"><th class="p-4">Student Name</th><th class="p-4">Mobile Number</th><th class="p-4">Assigned Batch</th><th class="p-4">Monthly Fee</th><th class="p-4">Admission Date (DD/MM/YYYY)</th><th class="p-4 text-center">Action</th></tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100 font-medium" id="studentTableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const GOOGLE_APP_URL = "https://script.google.com/macros/s/AKfycbw-3F1QFEmbOqmVxhs8Q0btUUweu14qh0lZ4OWn0EYIXmQDP9iDYRYp5cSaPvLHnYe0Jw/exec"; // <-- এখানে নতুন Deployment URL বসান
        let globalStudentsArray = [];

        function loadStudentRoster() {
            document.getElementById('loader').classList.remove('hidden');
            fetch(`${GOOGLE_APP_URL}?action=getStudentsWithPayments`).then(res => res.json()).then(students => {
                globalStudentsArray = students;
                document.getElementById('loader').classList.add('hidden');
                const tbody = document.getElementById('studentTableBody');
                tbody.innerHTML = students.map(s => `
                    <tr class="hover:bg-slate-50/50">
                        <td class="p-4 font-bold text-slate-900">${s.name}</td>
                        <td class="p-4 font-mono">${s.mobile}</td>
                        <td class="p-4"><span class="bg-indigo-50 text-indigo-600 text-xs px-2.5 py-1 rounded-md font-semibold">${s.batch}</span></td>
                        <td class="p-4 font-bold text-slate-600">₹${s.fee}</td>
                        <td class="p-4 text-slate-600 font-mono text-xs font-bold">${s.joinDate}</td>
                        <td class="p-4 text-center">
                            <button class="bg-slate-100 text-slate-600 text-xs px-3 py-1.5 rounded-xl"><i class="fa-solid fa-check mr-1"></i> Verified</button>
                        </td>
                    </tr>`).join('');
            });
        }
        window.addEventListener('DOMContentLoaded', loadStudentRoster);
    </script>
</body>
</html>
