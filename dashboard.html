<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - EduManager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="text-slate-800 antialiased flex flex-col md:flex-row min-h-screen bg-slate-50">
    <aside class="w-full md:w-64 bg-slate-900 text-slate-200 flex flex-col shadow-xl">
        <div class="p-5 bg-slate-950 border-b border-slate-800 flex justify-between items-center"><span class="text-xl font-bold text-indigo-400">EduManager Pro</span></div>
        <nav class="p-4 space-y-1.5 flex-1">
            <a href="dashboard.html" class="flex items-center space-x-3 px-4 py-3 rounded-xl bg-indigo-600 text-white text-sm font-semibold shadow-md"><i class="fa-solid fa-chart-pie w-5"></i><span>Dashboard</span></a>
            <div class="pt-4">
                <p class="px-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Management</p>
                <a href="student-entry.html" class="flex items-center space-x-3 px-4 py-2.5 rounded-xl hover:bg-slate-800 text-sm text-slate-400 hover:text-white"><i class="fa-solid fa-user-plus w-5"></i><span>Student Admission</span></a>
                <a href="student-list.html" class="flex items-center space-x-3 px-4 py-2.5 rounded-xl hover:bg-slate-800 text-sm text-slate-400 hover:text-white"><i class="fa-solid fa-users w-5"></i><span>Student List</span></a>
                <a href="payment-tracker.html" class="flex items-center space-x-3 px-4 py-2.5 rounded-xl hover:bg-slate-800 text-sm text-slate-400 hover:text-white"><i class="fa-solid fa-money-check-dollar w-5"></i><span>Monthly Payment Tracker</span></a>
                <a href="batch-control.html" class="flex items-center space-x-3 px-4 py-2.5 rounded-xl hover:bg-slate-800 text-sm text-slate-400 hover:text-white"><i class="fa-solid fa-cubes w-5"></i><span>Batch Management</span></a>
            </div>
        </nav>
    </aside>

    <main class="flex-1 p-4 md:p-8 space-y-6">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center bg-white p-6 rounded-2xl border border-slate-200 shadow-sm gap-4">
            <div><h1 class="text-2xl font-bold text-slate-900">Welcome, Administrator 👋</h1><p class="text-xs text-slate-500 mt-0.5">Real-time valuation engine</p></div>
            <div id="syncStatus" class="text-xs bg-indigo-50 text-indigo-600 font-bold px-4 py-2 rounded-xl"><i class="fa-solid fa-refresh animate-spin mr-1"></i> Calculating Ledger...</div>
        </div>

        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm space-y-3">
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider"><i class="fa-solid fa-magnifying-glass mr-1"></i> Global Student Smart Search</label>
            <div class="relative">
                <input type="text" id="dashboardSearchInput" oninput="executeSearchLookup()" placeholder="Search by Student Name or Mobile Number..." class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none">
                <div class="absolute left-3 top-3.5 text-slate-400"><i class="fa-solid fa-magnifying-glass"></i></div>
            </div>
            <div id="searchDropdownResult" class="bg-white border rounded-xl shadow-lg max-h-60 overflow-y-auto divide-y hidden"></div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-5">
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center justify-between">
                <div><span class="text-xs font-bold text-slate-400 uppercase">Active Enrolments</span><div id="activeCount" class="text-3xl font-bold text-slate-900 mt-1">0 Students</div></div>
                <div class="w-12 h-12 bg-emerald-50 text-emerald-500 rounded-xl flex items-center justify-center text-xl"><i class="fa-solid fa-user-check"></i></div>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center justify-between">
                <div><span class="text-xs font-bold text-slate-400 uppercase">Total Collected</span><div id="totalColl" class="text-3xl font-bold text-indigo-600 mt-1">INR 0</div></div>
                <div class="w-12 h-12 bg-indigo-50 text-indigo-500 rounded-xl flex items-center justify-center text-xl"><i class="fa-solid fa-wallet"></i></div>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center justify-between">
                <div><span class="text-xs font-bold text-slate-400 uppercase">Outstanding Dues</span><div id="totalDue" class="text-3xl font-bold text-rose-600 mt-1">INR 0</div></div>
                <div class="w-12 h-12 bg-rose-50 text-rose-500 rounded-xl flex items-center justify-center text-xl"><i class="fa-solid fa-circle-exclamation"></i></div>
            </div>
        </div>
    </main>

    <script>
        const GOOGLE_APP_URL = "https://script.google.com/macros/s/AKfycbw-3F1QFEmbOqmVxhs8Q0btUUweu14qh0lZ4OWn0EYIXmQDP9iDYRYp5cSaPvLHnYe0Jw/exec"; // <-- এখানে নতুন Deployment URL বসান
        let globalStudentsArray = [];

        window.addEventListener('DOMContentLoaded', () => {
            fetch(`${GOOGLE_APP_URL}?action=getGlobalDashboardReport`).then(res => res.json()).then(data => {
                document.getElementById('activeCount').innerText = data.activeStudents + " Active";
                document.getElementById('totalColl').innerText = "₹" + data.totalCollected;
                document.getElementById('totalDue').innerText = "₹" + data.totalDue;
                document.getElementById('syncStatus').className = "text-xs bg-emerald-50 text-emerald-600 font-bold px-4 py-2 rounded-xl";
                document.getElementById('syncStatus').innerHTML = "<i class='fa-solid fa-check-circle'></i> Cloud Sync Active";
            });
            fetch(`${GOOGLE_APP_URL}?action=getStudentsWithPayments`).then(res => res.json()).then(studs => { globalStudentsArray = studs; });
        });

        function executeSearchLookup() {
            const input = document.getElementById('dashboardSearchInput').value.toLowerCase().trim();
            const box = document.getElementById('searchDropdownResult');
            if(input.length === 0) { box.classList.add('hidden'); return; }
            const filtered = globalStudentsArray.filter(s => s.name.toLowerCase().includes(input) || s.mobile.toString().includes(input));
            if(filtered.length === 0) { box.innerHTML = `<div class="p-3 text-slate-400 text-xs">No records correspond to search query.</div>`; box.classList.remove('hidden'); return; }
            box.innerHTML = filtered.map(s => `
                <div class="p-3 hover:bg-indigo-50/60 cursor-pointer flex justify-between items-center transition-all">
                    <div><span class="font-bold text-slate-800">${s.name}</span><span class="text-[11px] text-slate-400 ml-2">(${s.batch})</span></div>
                    <div class="text-[11px] text-slate-500 font-bold font-mono">Date: ${s.joinDate} <i class="fa-solid fa-calendar ml-1 text-slate-300"></i></div>
                </div>`).join('');
            box.classList.remove('hidden');
        }
    </script>
</body>
</html>
